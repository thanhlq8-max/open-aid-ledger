name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Compile scripts and tests
        run: python -m compileall scripts tests
      - name: Validate wallet example
        run: python scripts/validate_wallets.py wallets.example.json --allow-placeholders
      - name: Validate campaign metadata
        run: python scripts/validate_campaigns.py campaigns/campaigns.example.json --allow-inactive-template
      - name: Validate readiness dry run
        run: python scripts/validate_readiness.py .
      - name: Validate ledgers
        run: python scripts/validate_ledger.py --donations ledger/donations.csv --disbursements ledger/disbursements.csv --enforce-balance
      - name: Validate sample ledgers
        run: python scripts/validate_ledger.py --donations examples/sample-ledger/donations.csv --disbursements examples/sample-ledger/disbursements.csv --enforce-balance
      - name: Validate static public status page
        run: python scripts/validate_static_status.py .
      - name: Validate candidate review
        run: python scripts/validate_candidate.py .
      - name: Public safety scan
        run: python scripts/check_public_safety.py .
      - name: Run tests
        run: python -m pytest -q
      - name: Generate empty report
        run: python scripts/generate_report.py --donations ledger/donations.csv --disbursements ledger/disbursements.csv --out reports/ci-report.md
      - name: Generate sample report
        run: python scripts/generate_report.py --donations examples/sample-ledger/donations.csv --disbursements examples/sample-ledger/disbursements.csv --out reports/ci-sample-report.md --title "Open Aid Ledger Sample Transparency Report"
